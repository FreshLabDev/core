services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api@sha256:1f88199917a42d1f0c14cda631c8265dc7fd8069ee181035428020210acbd77b
    container_name: telegram-bot-api
    restart: unless-stopped
    env_file: .env
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?set TELEGRAM_API_ID in .env}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?set TELEGRAM_API_HASH in .env}
      TELEGRAM_LOCAL: "1"
    volumes:
      - ./data:/var/lib/telegram-bot-api
      - /opt/stacks/shared-media-cache:/shared-media-cache:ro
    networks:
      - telegram_bot_api_net
    healthcheck:
      test: ["CMD-SHELL", "nc -z 0.0.0.0 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  telegram_bot_api_net:
    external: true
